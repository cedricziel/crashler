# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    # Default storage root resolves to <project>/var/share, which under a
    # Deployer-managed release symlinks into shared/var/share. Override with
    # an absolute APP_SHARE_DIR env var when the running PHP process has a
    # different CWD than the project (e.g. Apache + mod_php on shared hosting).
    crashler.storage_root_default: '%kernel.project_dir%/var/share'
    crashler.storage_root: '%env(default:crashler.storage_root_default:resolve:APP_SHARE_DIR)%'
    crashler.compression: '%env(string:CRASHLER_PARQUET_COMPRESSION)%'
    crashler.ingest.max_body_bytes: '%env(int:CRASHLER_INGEST_MAX_BODY_BYTES)%'
    crashler.ingest.max_decompressed_bytes: '%env(int:CRASHLER_INGEST_MAX_DECOMPRESSED_BYTES)%'

    # Schema-catalog root. Schemas live at config/schemas/<signal>/v<n>.yaml
    # and are validated at compile time by ValidateSchemasPass.
    crashler.schema_dir: '%kernel.project_dir%/config/schemas'

    # Read-side bounds. Mandatory time window keeps wide queries from
    # accidentally scanning the entire on-disk history; cursor secret signs
    # opaque pagination cursors so clients can't forge tenant escapes;
    # execution timeout caps any single read at a hard ceiling.
    crashler.read.max_time_window_days: '%env(default:crashler.read.max_time_window_days_default:int:CRASHLER_READ_MAX_TIME_WINDOW_DAYS)%'
    crashler.read.max_time_window_days_default: 30
    crashler.read.max_page_size: '%env(default:crashler.read.max_page_size_default:int:CRASHLER_READ_MAX_PAGE_SIZE)%'
    crashler.read.max_page_size_default: 1000
    crashler.read.span_lookup_window_hours: '%env(default:crashler.read.span_lookup_window_hours_default:int:CRASHLER_READ_SPAN_LOOKUP_WINDOW_HOURS)%'
    crashler.read.span_lookup_window_hours_default: 24
    crashler.read.execution_timeout_seconds: '%env(default:crashler.read.execution_timeout_seconds_default:int:CRASHLER_READ_EXECUTION_TIMEOUT_SECONDS)%'
    crashler.read.execution_timeout_seconds_default: 10
    # Cursor signing secret derives from APP_SECRET; rotating APP_SECRET
    # invalidates outstanding cursors (acceptable — cursors are ephemeral).
    crashler.read.cursor_secret: '%env(string:APP_SECRET)%'

    # POST /v1/<signal>/search body-size cap. Bounds JSON-decode work.
    crashler.read.post_search.max_body_bytes: '%env(default:crashler.read.post_search.max_body_bytes_default:int:CRASHLER_READ_POST_SEARCH_MAX_BODY_BYTES)%'
    crashler.read.post_search.max_body_bytes_default: 65536

    # Per-request cap on `attribute.<key>` filters. Distinct keys compose
    # with logical AND; repeating the same key remains rejected as a
    # repeated query parameter.
    crashler.read.max_attribute_filters: '%env(default:crashler.read.max_attribute_filters_default:int:CRASHLER_READ_MAX_ATTRIBUTE_FILTERS)%'
    crashler.read.max_attribute_filters_default: 5

    # Aggregation cardinality cap. Distinct group keys above this cap → 400.
    crashler.read.aggregate.max_groups: '%env(default:crashler.read.aggregate.max_groups_default:int:CRASHLER_READ_AGGREGATE_MAX_GROUPS)%'
    crashler.read.aggregate.max_groups_default: 200

    # Per-shim feature flags. Default false; routes are not registered
    # when off. See compat-shims capability for the contract.
    crashler.compat.tempo.enabled: '%env(default:crashler.compat.tempo.enabled_default:bool:CRASHLER_COMPAT_TEMPO_ENABLED)%'
    crashler.compat.tempo.enabled_default: false
    crashler.compat.loki.enabled: '%env(default:crashler.compat.loki.enabled_default:bool:CRASHLER_COMPAT_LOKI_ENABLED)%'
    crashler.compat.loki.enabled_default: false
    crashler.compat.prometheus.enabled: '%env(default:crashler.compat.prometheus.enabled_default:bool:CRASHLER_COMPAT_PROMETHEUS_ENABLED)%'
    crashler.compat.prometheus.enabled_default: false

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'
            - '../src/CrashlerBundle.php'
            - '../src/Story/'
            # Value objects, exceptions, factories, and DTOs are not services.
            - '../src/Tenancy/Tenant.php'
            - '../src/Tenancy/DuplicateTokenHashException.php'
            - '../src/Tenancy/TenantHasDataException.php'
            - '../src/Tenancy/Token/IssuedToken.php'
            - '../src/Otlp/Dto/'
            - '../src/Otlp/Exception/'
            - '../src/Storage/ParquetFileWriter.php'
            - '../src/Storage/PartitionPaths.php'
            # Schema infrastructure: value objects + factory-built catalog.
            - '../src/Schema/SchemaColumn.php'
            - '../src/Schema/SchemaDefinition.php'
            - '../src/Schema/SchemaCatalog.php'
            - '../src/Schema/SchemaCompiler.php'
            # Extractor is built per-signal via AttributeColumnExtractorFactory.
            - '../src/Otlp/AttributeColumnExtractor.php'
            # Read-side: API Platform Resource DTOs and value objects are
            # not services. Exceptions and the Cursor codec (static helpers)
            # are also not services.
            - '../src/Read/Resource/'
            - '../src/Read/Compute/Predicates/'
            - '../src/Read/Compute/ScanResult.php'
            - '../src/Read/Compute/ScanIoException.php'
            - '../src/Read/Compute/ScanTimeoutException.php'
            - '../src/Read/Cursor/Cursor.php'
            - '../src/Read/Cursor/InvalidCursorException.php'
            - '../src/Read/Criteria/'
            - '../src/Read/Controller/TraceTreeAssembler.php'

    # TenantRegistry is autowired from every TenantSourceInterface tagged
    # `crashler.tenant_source` (DbTenantSource priority 100, ConfigTenantSource
    # priority 0 — DB wins on cross-source hash collision). The registry is
    # reset at the start of each request by TenantRegistryRequestListener so
    # tokens added in one request authenticate in the next.

    # Bind constructor scalar args from container parameters.
    App\Storage\PartitionPathResolver:
        arguments:
            $storageRoot: '%crashler.storage_root%'

    # Read-side compute services. ParquetScanner is the only execution
    # path; PartitionPruner translates the time window into the file
    # globs the scanner consumes.
    App\Read\Compute\PartitionPruner:
        arguments:
            $storageRoot: '%crashler.storage_root%'

    App\Read\Compute\ParquetScanner:
        arguments:
            $executionTimeoutSeconds: '%crashler.read.execution_timeout_seconds%'

    # State providers per signal. Each one wraps the scanner with the
    # signal-specific predicate compilation; AP picks them via the
    # `provider:` argument on the operation.
    App\Read\State\LogsStateProvider:
        arguments:
            $maxTimeWindowDays: '%crashler.read.max_time_window_days%'
            $maxPageSize: '%crashler.read.max_page_size%'
            $cursorSecret: '%crashler.read.cursor_secret%'

    App\Read\State\TracesStateProvider:
        arguments:
            $maxTimeWindowDays: '%crashler.read.max_time_window_days%'
            $maxPageSize: '%crashler.read.max_page_size%'
            $cursorSecret: '%crashler.read.cursor_secret%'

    App\Read\State\MetricsStateProvider:
        arguments:
            $maxTimeWindowDays: '%crashler.read.max_time_window_days%'
            $maxPageSize: '%crashler.read.max_page_size%'
            $cursorSecret: '%crashler.read.cursor_secret%'

    # By-ID read controllers (item operations). Plain Symfony controllers
    # because the OTLP-faithful response shape doesn't fit AP's "single
    # Resource" convention cleanly. Same firewall + Bearer auth.
    App\Read\Controller\ReadTraceController:
        arguments:
            $maxTimeWindowDays: '%crashler.read.max_time_window_days%'
            $spanLookupWindowHours: '%crashler.read.span_lookup_window_hours%'

    App\Read\Controller\ReadSpanController:
        arguments:
            $maxTimeWindowDays: '%crashler.read.max_time_window_days%'
            $spanLookupWindowHours: '%crashler.read.span_lookup_window_hours%'

    # POST /v1/<signal>/search controllers. Plain Symfony controllers (same
    # rationale as the by-ID controllers); they share scanner+pruner with
    # the GET state providers and dispatch through `PostSearchController`.
    App\Read\Http\PostSearchRequestParser:
        arguments:
            $maxBodyBytes: '%crashler.read.post_search.max_body_bytes%'

    App\Read\Controller\PostLogsSearchController:
        arguments:
            $maxTimeWindowDays: '%crashler.read.max_time_window_days%'
            $maxPageSize: '%crashler.read.max_page_size%'
            $cursorSecret: '%crashler.read.cursor_secret%'
            $maxAttributeFilters: '%crashler.read.max_attribute_filters%'

    App\Read\Controller\PostTracesSearchController:
        arguments:
            $maxTimeWindowDays: '%crashler.read.max_time_window_days%'
            $maxPageSize: '%crashler.read.max_page_size%'
            $cursorSecret: '%crashler.read.cursor_secret%'
            $maxAttributeFilters: '%crashler.read.max_attribute_filters%'

    App\Read\Controller\PostMetricsSearchController:
        arguments:
            $maxTimeWindowDays: '%crashler.read.max_time_window_days%'
            $maxPageSize: '%crashler.read.max_page_size%'
            $cursorSecret: '%crashler.read.cursor_secret%'
            $maxAttributeFilters: '%crashler.read.max_attribute_filters%'

    App\Read\Http\ReadResponseConventionsListener:
        arguments:
            $maxAttributeFilters: '%crashler.read.max_attribute_filters%'

    # Aggregation endpoints (count/sum/avg/min/max with single-column groupBy in v1).
    App\Read\Compute\AggregatingScanner:
        arguments:
            $maxGroups: '%crashler.read.aggregate.max_groups%'

    App\Read\Controller\AggregateLogsController:
        arguments:
            $maxTimeWindowDays: '%crashler.read.max_time_window_days%'

    App\Read\Controller\AggregateTracesController:
        arguments:
            $maxTimeWindowDays: '%crashler.read.max_time_window_days%'

    App\Read\Controller\AggregateMetricsController:
        arguments:
            $maxTimeWindowDays: '%crashler.read.max_time_window_days%'

    # Compat shims — feature-flagged Grafana data-source compatibility.
    # All shims are OFF by default; controllers return 404 when their
    # flag is false. v1 ships only the connection-test endpoints; full
    # search/query_range coverage is a follow-up.
    App\Read\Compat\Tempo\EchoController:
        arguments:
            $enabled: '%crashler.compat.tempo.enabled%'

    App\Read\Compat\Loki\LabelsController:
        arguments:
            $enabled: '%crashler.compat.loki.enabled%'

    App\Read\Compat\Prometheus\LabelsController:
        arguments:
            $enabled: '%crashler.compat.prometheus.enabled%'

    # TraceTreeAssembler is a static helper, not a service.

    # Default Parquet writer wires the configured compression codec at boot.
    # ParquetCompression::resolve fails fast if the codec's PHP extension is
    # missing, surfacing misconfiguration before traffic flows.
    App\Storage\ParquetFileWriterFactory:
        arguments:
            $configuredCompressionName: '%crashler.compression%'

    App\Storage\ParquetFileWriter:
        factory: ['@App\Storage\ParquetFileWriterFactory', 'create']
        arguments: ['logs']

    App\Storage\WritesParquetFiles: '@App\Storage\ParquetFileWriter'

    # Distinct writer for traces; built from the same factory bound to
    # the traces schema so each signal writes its own column shape.
    crashler.parquet_writer.traces:
        class: App\Storage\ParquetFileWriter
        factory: ['@App\Storage\ParquetFileWriterFactory', 'create']
        arguments: ['traces']

    # Distinct writer for metrics; same factory pattern as traces.
    crashler.parquet_writer.metrics:
        class: App\Storage\ParquetFileWriter
        factory: ['@App\Storage\ParquetFileWriterFactory', 'create']
        arguments: ['metrics']

    # Signal-generic ingest pipeline. Per-signal controllers (logs today,
    # traces and metrics later) inject their three collaborators (JSON
    # decoder, protobuf decoder, ingest service) at call time.
    App\Otlp\OtlpRequestPipeline:
        arguments:
            $maxBodyBytes: '%crashler.ingest.max_body_bytes%'
            $maxDecompressedBytes: '%crashler.ingest.max_decompressed_bytes%'

    # SchemaCatalog is rebuilt at runtime from config/schemas/. Compile-time
    # validation runs separately via ValidateSchemasPass (see CrashlerBundle).
    App\Schema\SchemaCatalog:
        factory: ['App\Schema\SchemaCatalog', 'fromDirectory']
        arguments:
            - '%crashler.schema_dir%'

    # Per-signal AttributeColumnExtractor. The factory pulls the latest
    # schema for the named signal. Logs is the default service id (autowired
    # into LogsIngestService); traces gets its own service id wired explicitly
    # below so each signal binds its own promotion table.
    App\Otlp\AttributeColumnExtractor:
        factory: ['@App\Otlp\AttributeColumnExtractorFactory', 'forSignal']
        arguments: ['logs']

    crashler.attribute_extractor.traces:
        class: App\Otlp\AttributeColumnExtractor
        factory: ['@App\Otlp\AttributeColumnExtractorFactory', 'forSignal']
        arguments: ['traces']

    crashler.attribute_extractor.metrics:
        class: App\Otlp\AttributeColumnExtractor
        factory: ['@App\Otlp\AttributeColumnExtractorFactory', 'forSignal']
        arguments: ['metrics']

    # TracesIngestService binds the traces-specific writer + extractor so
    # the autowired LogsIngestService stays untouched.
    App\Traces\TracesIngestService:
        arguments:
            $writer: '@crashler.parquet_writer.traces'
            $extractor: '@crashler.attribute_extractor.traces'

    App\Metrics\MetricsIngestService:
        arguments:
            $writer: '@crashler.parquet_writer.metrics'
            $extractor: '@crashler.attribute_extractor.metrics'

    # Tag every SignalProfile so the explorer registry can iterate them.
    # _instanceof scopes the tag to implementations of the interface.
    _instanceof:
        App\Explorer\SignalProfile:
            tags: ['crashler.explorer.signal_profile']

    App\Explorer\SignalProfileRegistry:
        arguments:
            $profiles: !tagged_iterator crashler.explorer.signal_profile

    App\Controller\ExplorerController:
        arguments:
            $maxTimeWindowDays: '%crashler.read.max_time_window_days%'
        tags: ['controller.service_arguments']

    App\Console\CompactPartitionsCommand:
        arguments:
            $storageRoot: '%crashler.storage_root%'
            $configuredCompressionName: '%crashler.compression%'

    App\Explorer\TraceWaterfallResolver:
        arguments:
            $spanLookupWindowHours: '%crashler.read.span_lookup_window_hours%'

    App\Controller\WaterfallController:
        arguments:
            $maxTimeWindowDays: '%crashler.read.max_time_window_days%'
        tags: ['controller.service_arguments']

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

when@test:
    services:
        # Test-only TenantSourceInterface fixture. Supplies the historical
        # `test-tenant` (plaintext `cw_test_token_aaaaaaaaaaaaaaaaaa`) the
        # functional test suite has long depended on for authenticating
        # ingest/read calls. DbTenantSource still wins on collision because
        # it ships at priority 100; this fixture lives at priority 0.
        App\Tests\Support\Tenancy\TestTenantSource:
            autoconfigure: true
            tags:
                - { name: crashler.tenant_source, priority: 0 }
