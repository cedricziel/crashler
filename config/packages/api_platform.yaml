api_platform:
    title: 'Crashler Read API'
    description: 'Self-hosted OTLP read API. Bearer auth, tenant-scoped, time-windowed.'
    version: '1.0.0'
    # Crashler is a file-based read API; no Doctrine ORM, no Doctrine MongoDB.
    use_symfony_listeners: true
    doctrine:
        enabled: false
    doctrine_mongodb_odm:
        enabled: false
    # Content-negotiated response formats. jsonld is the default (Hydra);
    # hal, json (compact), and jsonapi are also negotiated via Accept header.
    # otlp+json is registered only on the Trace.Get operation via a custom
    # normalizer (see App\Read\Format\OtlpTraceNormalizer).
    # Scan our Read resource directory in addition to the default.
    mapping:
        paths:
            - '%kernel.project_dir%/src/ApiResource'
            - '%kernel.project_dir%/src/Read/Resource'
    formats:
        jsonld: ['application/ld+json']
        json: ['application/json']
        jsonapi: ['application/vnd.api+json']
        # HAL (`application/hal+json`) — api-platform/hal package is
        # installed but its serializer encoder isn't being picked up
        # (returns 400 "Serialization for the format 'hal' is not
        # supported"). Deferred to v1.1 pending investigation.
    docs_formats:
        jsonld: ['application/ld+json']
        jsonopenapi: ['application/vnd.openapi+json']
        html: ['text/html']
    # Document the Bearer-token security scheme so the OpenAPI spec at
    # /docs.jsonopenapi declares it under components.securitySchemes and the
    # Swagger UI shows an "Authorize" button. The scheme name "bearerAuth"
    # is referenced by the global `security` array below so every operation
    # requires it by default.
    swagger:
        api_keys:
            bearerAuth:
                name: Authorization
                type: header
    openapi:
        contact:
            name: Crashler
            url: https://crashler.cedric-ziel.com
    defaults:
        stateless: true
        # Apply bearer auth to every operation by default. Read endpoints
        # all require an authenticated tenant; the auth itself is enforced
        # by the existing Symfony firewall at ^/v1/.
        security: 'is_granted("IS_AUTHENTICATED_FULLY")'
        cache_headers:
            vary: ['Content-Type', 'Authorization', 'Origin']
