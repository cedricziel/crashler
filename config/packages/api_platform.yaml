api_platform:
    title: 'Crashler Read API'
    description: 'Self-hosted OTLP read API. Bearer auth, tenant-scoped, time-windowed.'
    version: '1.0.0'
    # Crashler is a file-based read API; no Doctrine ORM, no Doctrine MongoDB.
    use_symfony_listeners: true
    doctrine:
        enabled: false
    doctrine_mongodb_odm:
        enabled: false
    # Content-negotiated response formats. jsonld is the default (Hydra);
    # hal, json (compact), and jsonapi are also negotiated via Accept header.
    # otlp+json is registered only on the Trace.Get operation via a custom
    # normalizer (see App\Read\Format\OtlpTraceNormalizer).
    # Scan our Read resource directory in addition to the default.
    mapping:
        paths:
            - '%kernel.project_dir%/src/ApiResource'
            - '%kernel.project_dir%/src/Read/Resource'
    formats:
        jsonld: ['application/ld+json']
        hal: ['application/hal+json']
        json: ['application/json']
        jsonapi: ['application/vnd.api+json']
    docs_formats:
        jsonld: ['application/ld+json']
        jsonopenapi: ['application/vnd.openapi+json']
        html: ['text/html']
    defaults:
        stateless: true
        cache_headers:
            vary: ['Content-Type', 'Authorization', 'Origin']
