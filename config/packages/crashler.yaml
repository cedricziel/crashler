# Self-service UI configuration. Tenants and ingest tokens live in the
# database (managed via /admin or the user-facing /tenants/<slug> page);
# the YAML configuration that earlier releases used has been removed.
# See README → "Tenants and ingest tokens".

crashler:
    signup:
        enabled: '%env(bool:CRASHLER_SIGNUP_ENABLED)%'
        terms_url: '%env(default::CRASHLER_SIGNUP_TERMS_URL)%'
    invitations:
        expiry_days: '%env(int:CRASHLER_INVITATIONS_EXPIRY_DAYS)%'
        from_address: '%env(default::CRASHLER_INVITATIONS_FROM_ADDRESS)%'
