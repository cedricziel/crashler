security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        # Persisted operator/user accounts. Used by both the admin and main
        # firewalls (form login).
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email
        # The IngestTokenAuthenticator self-loads the user via UserBadge; this
        # provider is wired only because Symfony's firewall config requires one.
        ingest_provider: { id: App\Security\IngestUserProvider }

    firewalls:
        dev:
            # Ensure dev tools and static assets are always allowed
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        ingest:
            pattern: ^/(v1|compat)/
            stateless: true
            provider: ingest_provider
            custom_authenticators:
                - App\Security\IngestTokenAuthenticator
        admin:
            pattern: ^/admin
            lazy: true
            provider: app_user_provider
            context: app
            form_login:
                login_path: app_login
                check_path: app_login
                username_parameter: _username
                password_parameter: _password
                enable_csrf: true
                default_target_path: /admin
            logout:
                path: app_logout
                target: /login
        main:
            lazy: true
            provider: app_user_provider
            context: app
            form_login:
                login_path: app_login
                check_path: app_login
                username_parameter: _username
                password_parameter: _password
                enable_csrf: true
                default_target_path: /admin
            logout:
                path: app_logout
                target: /login

    # Note: Only the *first* matching rule is applied
    access_control:
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/logout, roles: PUBLIC_ACCESS }
        - { path: ^/signup, roles: PUBLIC_ACCESS }
        - { path: ^/invitations/claim/, roles: PUBLIC_ACCESS }
        - { path: ^/v1/, roles: ROLE_INGEST }
        - { path: ^/compat/, roles: ROLE_INGEST }
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/dashboard, roles: ROLE_USER }
        - { path: ^/orgs, roles: ROLE_USER }
        - { path: ^/tenants, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            # Password hashers are resource-intensive by design to ensure security.
            # In tests, it's safe to reduce their cost to improve performance.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
