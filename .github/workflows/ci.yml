name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: PHPUnit (PHP ${{ matrix.php }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        php: ["8.5"]

    env:
      APP_ENV: test
      APP_SHARE_DIR: ${{ github.workspace }}/var/share
      CRASHLER_PARQUET_COMPRESSION: GZIP
      CRASHLER_INGEST_MAX_BODY_BYTES: "4194304"
      CRASHLER_INGEST_MAX_DECOMPRESSED_BYTES: "16777216"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: ctype, iconv, intl, zip, dom, mbstring, zlib
          coverage: pcov
          tools: composer:v2
          ini-values: |
            memory_limit=512M
            error_reporting=-1
            display_errors=On

      - name: Validate composer.json
        run: composer validate --strict --no-check-publish

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Prepare storage root
        run: mkdir -p var/share

      - name: Run unit tests
        run: composer test:unit

      - name: Run component tests
        run: composer test:component

      - name: Run functional tests
        run: composer test:functional

      - name: Run coverage gate
        run: composer test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.php }}
          path: var/coverage/
          if-no-files-found: ignore
          retention-days: 14
