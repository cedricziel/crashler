name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality (PHP-CS-Fixer + PHPStan)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          extensions: ctype, iconv, intl, zip, dom, mbstring, zlib
          tools: composer:v2
          ini-values: |
            memory_limit=1G
            error_reporting=-1
            display_errors=On

      - name: Cache Composer dependencies (root)
        uses: actions/cache@v6
        with:
          path: ~/.cache/composer
          key: composer-quality-${{ hashFiles('composer.lock') }}-${{ hashFiles('tools/*/composer.lock') }}
          restore-keys: composer-quality-

      - name: Install root dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Install quality tool dependencies
        run: composer tools:install

      - name: Run quality gate (cs:check + phpstan)
        run: composer quality

  test:
    name: PHPUnit (PHP ${{ matrix.php }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        php: ["8.5"]

    # Postgres service for the functional tests added in
    # add-identity-and-tenant-persistence + add-tenant-self-service-ui.
    # Doctrine config appends `_test` to the configured dbname when APP_ENV=test
    # (see config/packages/doctrine.yaml `when@test`), so the DB the tests
    # actually connect to is `app_test` — created here directly.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: app_test
          POSTGRES_USER: app
          POSTGRES_PASSWORD: '!ChangeMe!'
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d app_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      APP_ENV: test
      APP_SHARE_DIR: ${{ github.workspace }}/var/share
      CRASHLER_PARQUET_COMPRESSION: GZIP
      CRASHLER_INGEST_MAX_BODY_BYTES: "4194304"
      CRASHLER_INGEST_MAX_DECOMPRESSED_BYTES: "16777216"
      CRASHLER_INVITATIONS_FROM_ADDRESS: "noreply@crashler.test"
      DATABASE_URL: "postgresql://app:!ChangeMe!@127.0.0.1:5432/app?serverVersion=16&charset=utf8"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: ctype, iconv, intl, zip, dom, mbstring, zlib, pdo_pgsql
          coverage: pcov
          tools: composer:v2
          ini-values: |
            memory_limit=512M
            error_reporting=-1
            display_errors=On

      - name: Validate composer.json
        run: composer validate --strict --no-check-publish

      - name: Cache Composer dependencies
        uses: actions/cache@v6
        with:
          path: ~/.cache/composer
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Prepare storage root
        run: mkdir -p var/share

      - name: Run unit tests
        run: composer test:unit

      - name: Run component tests
        run: composer test:component

      - name: Run functional tests
        run: composer test:functional

      - name: Run coverage gate
        run: composer coverage:gate

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.php }}
          path: var/coverage/
          if-no-files-found: ignore
          retention-days: 14
